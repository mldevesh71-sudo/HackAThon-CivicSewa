<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa | Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/base.css">
    
    <style>
        .auth-wrapper {
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        .auth-card { width: 100%; max-width: 550px; padding: 2.5rem; }
        .auth-input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; border-radius: 10px; padding: 10px 14px; width: 100%; transition: 0.3s;
        }
        .auth-input:focus { background: rgba(0, 0, 0, 0.5); border-color: var(--gold); outline: none; }
        select.auth-input option { background-color: var(--bg-base); color: white; }
        .auth-btn {
            background: linear-gradient(135deg, rgba(255,215,0,0.8), rgba(200,160,0,0.6)); color: #000;
            font-weight: 700; border: none; padding: 12px; border-radius: 10px; width: 100%; transition: 0.3s;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,215,0,0.4); }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <a href="index.html" class="position-absolute top-0 start-0 m-4 text-decoration-none text-muted d-flex align-items-center gap-2">
        <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <div class="auth-wrapper">
        <div class="glass-box auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1">Civic<span style="color: var(--gold);">Sewa</span></h2>
                <p class="text-muted small">Join the national smart governance network</p>
            </div>

            <form id="regForm">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Full Name</label>
                        <input type="text" id="fullName" class="auth-input" placeholder="Aayush Sharma" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Account Type</label>
                        <select id="userType" class="auth-input" required>
                            <option value="resident">Citizen / Resident</option>
                            <option value="ward">Ward Official</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-3" id="wardFields" style="display: none;">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Ward No.</label>
                        <input type="number" id="ward" class="auth-input" placeholder="e.g. 10">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Municipality</label>
                        <input type="text" id="muni" class="auth-input" placeholder="Lalitpur">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Email Address</label>
                    <input type="email" id="regEmail" class="auth-input" placeholder="name@example.com" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Password</label>
                    <input type="password" id="regPass" class="auth-input" placeholder="Create a strong password" required>
                </div>

                <button type="button" id="registerBtn" class="auth-btn">Create Account</button>
                
                <div class="text-center mt-4 small">
                    <span class="text-muted">Already have an account?</span> 
                    <a href="login.html" style="color: var(--gold); text-decoration: none; font-weight: 600;">Sign in here</a>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade glass-modal" id="verificationModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="mb-3 text-success">
                    <i class="bi bi-check-circle-fill" style="font-size: 3rem;"></i>
                </div>
                <h5 class="fw-bold text-white">Account Created!</h5>
                <p class="text-muted small mt-2">
                    We've sent a verification link to:<br>
                    <strong id="verifyEmail" style="color: var(--gold);"></strong>
                </p>
                <p class="text-muted small">Please verify your email address before attempting to sign in.</p>
                <button type="button" class="btn btn-outline-success rounded-pill mt-3 w-100 fw-semibold" onclick="window.location.href='login.html'">Go to Login</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Ward field toggle logic
        const userTypeSelect = document.getElementById("userType");
        const wardFields = document.getElementById("wardFields");
        
        userTypeSelect.addEventListener("change", (e) => {
            if (e.target.value === "ward") {
                wardFields.style.display = "flex";
                document.getElementById("ward").required = true;
                document.getElementById("muni").required = true;
            } else {
                wardFields.style.display = "none";
                document.getElementById("ward").required = false;
                document.getElementById("muni").required = false;
            }
        });
    </script>

    <script type="module" src="js/core/auth-check.js"></script>
</body>
</html>
