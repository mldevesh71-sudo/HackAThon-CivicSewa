<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - Ward Broadcasts</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="../../css/base.css">

    <style>
        .admin-input {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        .admin-input:focus {
            background: rgba(0, 0, 0, 0.6) !important;
            border-color: var(--gold) !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.25) !important;
        }
        .broadcast-card {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .broadcast-card.emergency-card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
            background-color: #dc3545;
        }
        .broadcast-card.strike-card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
            background-color: #ffc107; /* Warning yellow for strikes */
        }
        .delete-btn { position: absolute; top: 15px; right: 15px; z-index: 10; }
        
        /* Map Overrides for Dark UI */
        #modalMap { height: 220px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; z-index: 1; filter: brightness(0.9); }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrap">
                <i class="bi bi-buildings-fill"></i> 
                <span class="nav-text">CivicSewa <span class="text-warning ms-1" style="font-size: 0.7rem;">ADMIN</span></span>
            </div>
            <i class="bi bi-list fs-3 text-secondary" id="sidebarToggle" style="cursor: pointer;"></i>
        </div>
        
        <a href="ward-dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> <span class="nav-text">Control Panel</span></a>
        <a href="ward-complaints.html" class="nav-link"><i class="bi bi-inboxes"></i> <span class="nav-text">Ward Complaints</span></a>
        <a href="ward-broadcast.html" class="nav-link active"><i class="bi bi-broadcast"></i> <span class="nav-text">Broadcast Log</span></a>
        <a href="ward-settings.html" class="nav-link"><i class="bi bi-gear"></i> <span class="nav-text">Settings</span></a>
        
        <button id="logoutBtn" class="sign-out-btn w-100 border-0 mt-auto">
            <i class="bi bi-box-arrow-right"></i> <span class="nav-text">Sign Out</span>
        </button>
    </nav>

    <main class="main-wrapper">
        <header class="top-nav">
            <div class="search-container">
                <i class="bi bi-search text-secondary"></i>
                <input type="text" placeholder="Search broadcasts...">
            </div>
            <div class="profile-section">
                <label class="theme-slider" title="Toggle Light/Dark Mode">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider-pill"></span>
                </label>
                <select id="languageSelect" class="form-select border-secondary text-light" style="background: rgba(0,0,0,0.4); width: auto;">
                    <option value="en" style="background: #110d20;">English</option>
                    <option value="np" style="background: #110d20;">नेपाली</option>
                </select>
                <div class="user-info ps-3 border-start border-secondary">
                    <div style="line-height: 1.3;">
                        <div class="fw-bold text-end" style="font-size: 0.95rem;"><span id="uNameTop">Loading...</span></div>
                        <div class="text-warning text-end" style="font-size: 0.85rem;" id="uWard">Ward --</div>
                    </div>
                </div>
            </div>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="greeting-title mb-0">Broadcast Management</h1>
            <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#createModal">
                <i class="bi bi-geo-alt-fill me-2"></i>New Localized Alert
            </button>
        </div>

        <div class="row g-4" id="broadcastContainer">
            <div class="col-12 text-center mt-5"><div class="spinner-border text-secondary"></div></div>
        </div>
    </main>

    <div class="modal fade glass-modal" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header border-secondary border-opacity-25">
                    <h5 class="modal-title fw-bold text-warning"><i class="bi bi-broadcast me-2"></i>Transmit Alert & Mark Location</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4">
                        
                        <div class="col-md-6 d-flex flex-column">
                            <input id="title" class="form-control admin-input mb-3" placeholder="Alert Title">
                            
                            <select id="category" class="form-select admin-input mb-3">
                                <option value="Water & Sanitation" style="background: #110d20;">Water & Sanitation</option>
                                <option value="Roads & Transport" style="background: #110d20;">Roads & Transport</option>
                                <option value="Waste Management" style="background: #110d20;">Waste Management</option>
                                <option value="Electricity" style="background: #110d20;">Electricity</option>
                                <option value="General Announcement" style="background: #110d20;">General Announcement</option>
                            </select>

                            <textarea id="content" class="form-control admin-input mb-3 flex-grow-1" rows="3" placeholder="Description"></textarea>

                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="emergency" style="background-color: transparent; border-color: rgba(255,255,255,0.3);">
                                <label class="form-check-label text-danger fw-bold small">Tag as Critical Emergency</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="isStrike" style="background-color: transparent; border-color: rgba(255,255,255,0.3);">
                                <label class="form-check-label text-warning fw-bold small">Is this a Strike / Roadblock?</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small text-muted fw-bold">Click on the map to set exact location:</label>
                            <div id="modalMap"></div>
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="text" id="latInput" class="form-control admin-input form-control-sm text-center" placeholder="Latitude" readonly>
                                </div>
                                <div class="col-6">
                                    <input type="text" id="lngInput" class="form-control admin-input form-control-sm text-center" placeholder="Longitude" readonly>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer border-secondary border-opacity-25">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning fw-bold px-4" id="postBtn">Broadcast to Ward</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            document.getElementById('sidebar').addEventListener('click', (e) => {
                const isToggle = e.target.closest('#sidebarToggle');
                const isLogo = e.target.closest('.logo-wrap');
                if (isToggle) { body.classList.add('sidebar-collapsed'); } 
                else if (isLogo && body.classList.contains('sidebar-collapsed')) { body.classList.remove('sidebar-collapsed'); }
            });
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('civicsewa_theme') === 'light') { body.classList.add('light-theme'); if (themeToggle) themeToggle.checked = true; }
            if (themeToggle) {
                themeToggle.addEventListener('change', function() {
                    if (this.checked) { body.classList.add('light-theme'); localStorage.setItem('civicsewa_theme', 'light'); } 
                    else { body.classList.remove('light-theme'); localStorage.setItem('civicsewa_theme', 'dark'); }
                });
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../../js/ward/ward-broadcast.js"></script>
</body>
</html>
