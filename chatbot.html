<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa | Guidance Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global-glassmorphism.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>

<div class="d-flex">
    <div id="sidebar" class="d-flex flex-column py-4">
        <div class="sidebar-brand px-4 mb-4">
            <div class="sidebar-brand-icon"></div> CivicSewa
        </div>
        <ul class="nav nav-pills flex-column flex-grow-1 mt-2">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2 me-3"></i> Dashboard</a></li>
            <li><a href="my-complaints.html" class="nav-link"><i class="bi bi-chat-dots me-3"></i> My Complaints</a></li>
            <li><a href="documents.html" class="nav-link"><i class="bi bi-file-earmark-pdf me-3"></i> Documents</a></li>
            <li><a href="broadcast.html" class="nav-link"><i class="bi bi-broadcast me-3"></i> Broadcast Channel</a></li>
            <li><a href="road.html" class="nav-link"><i class="bi bi-signpost-2 me-3"></i> Road Map</a></li>
            <li><a href="chatbot.html" class="nav-link active"><i class="bi bi-robot me-3"></i> Guidance Chatbot</a></li>
            <li><a href="settings.html" class="nav-link"><i class="bi bi-gear me-3"></i> Settings</a></li>
        </ul>
        <div class="px-4 mt-auto">
            <button id="logoutBtn" class="btn btn-outline-light w-100" style="border-radius: 10px;">Sign Out</button>
        </div>
    </div>

    <div class="main-content flex-grow-1">
        <nav class="top-navbar d-flex align-items-center justify-content-between">
            <div class="input-group w-25">
                <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" class="form-control bg-light border-0 shadow-none" placeholder="Search...">
            </div>
            <div class="d-flex align-items-center">
                <span class="badge rounded-pill me-3" style="background: var(--bg-ocean-soft); padding: 8px 16px;" id="uWard">Ward --</span>
                <strong id="uNameTop" style="color: var(--bg-ocean);">User Name</strong>
            </div>
        </nav>

        <div class="container-fluid p-4 h-100 d-flex flex-column" style="max-height: calc(100vh - 70px);">
            <div class="bento-card flex-grow-1 d-flex flex-column p-0 overflow-hidden">
                
                <div class="chat-header d-flex justify-content-between align-items-center p-3 border-bottom">
                    <h5 class="mb-0 fw-bold" style="color: var(--bg-ocean);"><i class="bi bi-robot text-primary me-2"></i> AI Assistant</h5>
                    <button id="exportChat" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                        <i class="bi bi-download me-1"></i> Export PDF
                    </button>
                </div>

                <div class="chat-body flex-grow-1 p-4" id="chatBody" style="overflow-y: auto; background: #f8fafc;">
                    <div class="message ai">
                        <div class="msg-content">Hello! I'm your CivicSewa AI assistant. How can I help you navigate ward services today?</div>
                        <div class="timestamp">Just now</div>
                    </div>
                </div>

                <div class="typing-indicator hidden px-4 py-2 text-muted small fst-italic" id="typingIndicator">
                    Civic AI is thinking...
                </div>

                <div class="chat-input-area p-3 bg-white border-top d-flex gap-2 align-items-end">
                    <input type="file" id="fileInput" hidden />
                    <button id="attachBtn" class="btn btn-light rounded-circle shadow-sm" style="width: 45px; height: 45px;">
                        <i class="bi bi-paperclip fs-5 text-muted"></i>
                    </button>
                    <textarea id="chatInput" class="form-control bg-light border-0 shadow-none" rows="1" placeholder="Describe your issue or ask a question..." style="resize: none; border-radius: 20px; padding: 12px 20px; max-height: 120px;"></textarea>
                    <button id="sendBtn" class="btn-gradient rounded-circle d-flex align-items-center justify-content-center p-0" style="width: 45px; height: 45px; flex-shrink: 0;">
                        <i class="bi bi-send-fill text-white"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="chatbot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</body>
</html>
